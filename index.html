<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preload" href="resources/arena_p1win.webm" as="video" type="video/webm">
  <link rel="preload" href="resources/arena_p2win.webm" as="video" type="video/webm">
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/norwester">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #game-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    #hud {
      position: fixed;
      top: 30px;
      left: 0;
      width: 100%;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: flex-start;
      pointer-events: none;
    }

    .health-bar {
      width: 500px;
      height: 55px;
      background: #1b1725;
      border: 3px solid #444;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .health-bar-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      transition: width 0.3s ease;
    }

    #maxx-health {
      transform: skewX(30deg);
      border-color: #00e5ff;
    }

    #maxx-health .health-bar-fill {
      background: linear-gradient(to bottom, #4cb8ff, #1a6aad);
    }

    #hammer-health {
      transform: skewX(-30deg);
      border-color: #fc6c85;
    }

    #hammer-health .health-bar-fill {
      background: linear-gradient(to bottom, #c84cff, #7a1aad);
    }

    .player-label {
      position: absolute;
      top: 50%;
      font-family: 'Norwester', sans-serif;
      font-size: 20px;
      color: #fff;
      z-index: 1;
      pointer-events: none;
    }

    #maxx-health .player-label {
      left: 28px;
      transform: translateY(-50%) skewX(-30deg) scaleY(1.2);
      transform-origin: left center;
    }

    #hammer-health .player-label {
      right: 28px;
      transform: translateY(-50%) skewX(30deg) scaleY(1.2);
      transform-origin: right center;
    }

    .waveform {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: space-evenly;
      padding: 0 4px;
      box-sizing: border-box;
      pointer-events: none;
      z-index: 0;
    }

    .waveform-bar {
      width: 3px;
      border-radius: 2px 2px 0 0;
      animation: waveform 0.7s ease-in-out infinite alternate;
    }

    #maxx-health .waveform-bar {
      background: rgba(0, 229, 255, 0.55);
    }

    #hammer-health .waveform-bar {
      background: rgba(255, 100, 130, 0.55);
    }

    @keyframes waveform {
      0%   { height: 3px; }
      100% { height: 50px; }
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      pointer-events: auto;
    }

    #maxx-health ~ .action-buttons {
      transform: skewX(-30deg);
    }

    #maxx-health ~ .action-buttons .action-btn span,
    #maxx-health ~ .action-buttons .action-btn svg.btn-icon {
      display: inline-block;
      transform: skewX(30deg);
    }

    #hammer-health ~ .action-buttons {
      transform: skewX(30deg);
    }

    #hammer-health ~ .action-buttons .action-btn span,
    #hammer-health ~ .action-buttons .action-btn svg.btn-icon {
      display: inline-block;
      transform: skewX(-30deg);
    }

    .action-btn[data-action="fyre"]:hover .btn-icon {
      filter: drop-shadow(0 0 5px #3ca03c);
    }
    .action-btn[data-action="mid"]:hover .btn-icon {
      filter: drop-shadow(0 0 5px #c8c800);
    }
    .action-btn[data-action="flush"]:hover .btn-icon {
      filter: drop-shadow(0 0 5px #c83232);
    }

    .action-btn {
      padding: 8px 14px 6px;
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: 2px solid #626262;
      border-radius: 8px;
      cursor: pointer;
      color: #626262;
      background: #1b1725;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .btn-icon {
      height: 28px;
      width: auto;
      flex-shrink: 0;
    }

    .btn-counter {
      font-family: 'Exo 2', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    #maxx-health ~ .action-buttons .btn-counter {
      color: #00e5ff;
    }

    #hammer-health ~ .action-buttons .btn-counter {
      color: #ff4d6d;
    }

    .action-btn[data-action="fyre"]:hover {
      color: #3ca03c;
      border-color: #3a7a3a;
      box-shadow: 0 0 8px rgba(60, 160, 60, 0.5);
    }
    #maxx-health ~ .action-buttons .action-btn[data-action="fyre"]:hover {
      background: linear-gradient(to left, rgba(60, 160, 60, 0.5) 0%, #1b1725 75%);
    }
    #hammer-health ~ .action-buttons .action-btn[data-action="fyre"]:hover {
      background: linear-gradient(to left, rgba(60, 160, 60, 0.5) 0%, #1b1725 75%);
    }

    .action-btn[data-action="mid"]:hover {
      color: #c8c800;
      border-color: #7a7a00;
      box-shadow: 0 0 8px rgba(200, 200, 0, 0.5);
    }
    #maxx-health ~ .action-buttons .action-btn[data-action="mid"]:hover {
      background: linear-gradient(to left, rgba(200, 200, 0, 0.45) 0%, #1b1725 75%);
    }
    #hammer-health ~ .action-buttons .action-btn[data-action="mid"]:hover {
      background: linear-gradient(to left, rgba(200, 200, 0, 0.45) 0%, #1b1725 75%);
    }

    .action-btn[data-action="flush"]:hover {
      color: #c83232;
      border-color: #7a1a1a;
      box-shadow: 0 0 8px rgba(200, 50, 50, 0.5);
    }
    #maxx-health ~ .action-buttons .action-btn[data-action="flush"]:hover {
      background: linear-gradient(to left, rgba(200, 50, 50, 0.5) 0%, #1b1725 75%);
    }
    #hammer-health ~ .action-buttons .action-btn[data-action="flush"]:hover {
      background: linear-gradient(to left, rgba(200, 50, 50, 0.5) 0%, #1b1725 75%);
    }

    .action-btn.inactive {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    @keyframes vote-appear {
      0%   { transform: scale(0.1); opacity: 0; filter: brightness(6) blur(4px); }
      28%  { transform: scale(1.18); opacity: 1; filter: brightness(2.5); }
      50%  { transform: scale(0.93); filter: brightness(1.1); }
      70%  { transform: scale(1.05); filter: brightness(1); }
      85%  { transform: scale(0.98); }
      100% { transform: scale(1); opacity: 1; filter: brightness(1); }
    }

    @keyframes electric-glow-cyan {
      0%   { box-shadow: 0 0 6px #00e5ff, 0 0 14px rgba(0,229,255,0.5); border-color: #00e5ff; color: #22e8e8; }
      12%  { box-shadow: 0 0 2px #fff, 0 0 28px #00e5ff, 0 0 52px rgba(0,229,255,0.7), inset 0 0 10px rgba(0,229,255,0.18); border-color: #aaffff; color: #fff; }
      26%  { box-shadow: 0 0 8px #00e5ff, 0 0 10px rgba(0,229,255,0.3); border-color: #00e5ff; color: #22e8e8; }
      40%  { box-shadow: 0 0 1px #00e5ff, 0 0 24px #00e5ff, 0 0 44px rgba(0,229,255,0.6); border-color: #80ffff; color: #aaffff; }
      54%  { box-shadow: 0 0 5px #00e5ff, 0 0 12px rgba(0,229,255,0.35); border-color: #00e5ff; color: #22e8e8; }
      65%  { box-shadow: 0 0 3px #fff, 0 0 22px #00e5ff, 0 0 42px rgba(0,229,255,0.65), inset 0 0 14px rgba(0,229,255,0.22); border-color: #ccffff; color: #fff; }
      78%  { box-shadow: 0 0 6px #00e5ff, 0 0 13px rgba(0,229,255,0.4); border-color: #00e5ff; color: #22e8e8; }
      90%  { box-shadow: 0 0 2px #fff, 0 0 20px #00e5ff, 0 0 36px rgba(0,229,255,0.55); border-color: #88ffff; color: #eeffff; }
      100% { box-shadow: 0 0 6px #00e5ff, 0 0 14px rgba(0,229,255,0.5); border-color: #00e5ff; color: #22e8e8; }
    }

    @keyframes electric-glow-watermelon {
      0%   { box-shadow: 0 0 6px #fc6c85, 0 0 14px rgba(252,108,133,0.5); border-color: #fc6c85; color: #ff6b8a; }
      12%  { box-shadow: 0 0 2px #fff, 0 0 28px #fc6c85, 0 0 52px rgba(252,108,133,0.7), inset 0 0 10px rgba(252,108,133,0.18); border-color: #ffbbcc; color: #fff; }
      26%  { box-shadow: 0 0 8px #fc6c85, 0 0 10px rgba(252,108,133,0.3); border-color: #fc6c85; color: #ff6b8a; }
      40%  { box-shadow: 0 0 1px #fc6c85, 0 0 24px #fc6c85, 0 0 44px rgba(252,108,133,0.6); border-color: #ffaacc; color: #ffaaaa; }
      54%  { box-shadow: 0 0 5px #fc6c85, 0 0 12px rgba(252,108,133,0.35); border-color: #fc6c85; color: #ff6b8a; }
      65%  { box-shadow: 0 0 3px #fff, 0 0 22px #fc6c85, 0 0 42px rgba(252,108,133,0.65), inset 0 0 14px rgba(252,108,133,0.22); border-color: #ffddcc; color: #fff; }
      78%  { box-shadow: 0 0 6px #fc6c85, 0 0 13px rgba(252,108,133,0.4); border-color: #fc6c85; color: #ff6b8a; }
      90%  { box-shadow: 0 0 2px #fff, 0 0 20px #fc6c85, 0 0 36px rgba(252,108,133,0.55); border-color: #ffcccc; color: #ffeeee; }
      100% { box-shadow: 0 0 6px #fc6c85, 0 0 14px rgba(252,108,133,0.5); border-color: #fc6c85; color: #ff6b8a; }
    }

    @keyframes spark-sweep {
      0%   { left: -60%; opacity: 0; }
      6%   { opacity: 1; }
      94%  { opacity: 0.8; }
      100% { left: 160%; opacity: 0; }
    }

    @keyframes spark-sweep2 {
      0%   { left: -40%; opacity: 0; }
      8%   { opacity: 0.55; }
      92%  { opacity: 0.35; }
      100% { left: 140%; opacity: 0; }
    }

    .vote-btn {
      visibility: hidden;
      font-weight: 700;
      font-style: italic;
      text-transform: uppercase;
      font-size: 22px;
      padding: 6px 32px;
      position: relative;
      overflow: hidden;
    }

    .vote-btn::before,
    .vote-btn::after {
      content: '';
      position: absolute;
      top: 0;
      height: 100%;
      pointer-events: none;
    }

    .vote-btn::before {
      left: -60%;
      width: 35%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), rgba(255,255,255,0.38), rgba(255,255,255,0.06), transparent);
      animation: spark-sweep 2.3s ease-in-out infinite;
    }

    .vote-btn::after {
      left: -40%;
      width: 20%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), rgba(255,255,255,0.18), rgba(255,255,255,0.04), transparent);
      animation: spark-sweep2 1.5s 0.6s ease-in-out infinite;
    }

    .vote-btn[data-player="maxx"].vote-visible {
      animation: vote-appear 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 electric-glow-cyan 0.9s ease-in-out infinite;
    }

    .vote-btn[data-player="hammer"].vote-visible {
      animation: vote-appear 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 electric-glow-watermelon 0.9s ease-in-out infinite;
    }

    .vote-btn[data-player="maxx"]:hover {
      color: #22e8e8;
      border-color: #0891b2;
      background: linear-gradient(to left, rgba(6, 182, 212, 0.5) 0%, #1b1725 75%);
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
    }

    .vote-btn[data-player="hammer"] {
      justify-content: flex-end;
    }

    .vote-btn[data-player="hammer"]:hover {
      color: #ff6b8a;
      border-color: #c0304a;
      background: linear-gradient(to right, rgba(255, 80, 110, 0.5) 0%, #1b1725 75%);
      box-shadow: 0 0 12px rgba(255, 80, 110, 0.6);
    }

    .vote-row {
      margin-top: 8px;
      width: 100%;
    }

    #maxx-health ~ .vote-row {
      transform: skewX(-30deg) translateX(-30px);
    }

    #maxx-health ~ .vote-row .vote-btn {
      justify-content: flex-end;
    }

    #hammer-health ~ .vote-row {
      transform: skewX(30deg) translateX(30px);
    }

    #hammer-health ~ .vote-row .vote-btn {
      justify-content: flex-start;
    }

    @keyframes flush-toast-rise {
      0%   { opacity: 0;   transform: translateY(0px); }
      12%  { opacity: 1;   transform: translateY(-6px); }
      65%  { opacity: 1;   transform: translateY(-14px); }
      100% { opacity: 0;   transform: translateY(-26px); }
    }

    #flush-toast-container {
      position: relative;
      height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: visible;
      pointer-events: none;
    }

    .flush-toast {
      position: absolute;
      top: 0;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.12em;
      white-space: nowrap;
      pointer-events: none;
      animation: flush-toast-rise 1.5s ease-out forwards;
    }

    #round-counter {
      font-family: 'Norwester', sans-serif;
      color: #fff;
      text-shadow: 2px 2px 6px #000, 0 0 12px #000;
      font-size: 100px;
      line-height: 1;
      width: 120px;
      aspect-ratio: 5 / 6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    @keyframes ko-blink-out {
      0%   { opacity: 1; }
      20%  { opacity: 0; }
      40%  { opacity: 1; }
      60%  { opacity: 0; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #ko-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    #ko-overlay.visible {
      opacity: 1;
    }

    #ko-overlay.blink-out {
      animation: ko-blink-out 0.3s steps(1, end) forwards;
    }

    @keyframes ko-fire {
      0%   { filter: brightness(1.0); }
      10%  { filter: brightness(1.6); }
      20%  { filter: brightness(0.9); }
      35%  { filter: brightness(1.5); }
      50%  { filter: brightness(1.1); }
      65%  { filter: brightness(1.7); }
      80%  { filter: brightness(0.85); }
      90%  { filter: brightness(1.4); }
      100% { filter: brightness(1.0); }
    }

    @keyframes ko-appear {
      0%     { transform: scale(2); }
      7%     { transform: scale(2); }
      7.01%  { transform: scale(0.8); }
      14%    { transform: scale(0.8); }
      14.01% { transform: scale(1); }
      100%   { transform: scale(1); }
    }

    #ko-overlay span {
      font-family: 'Norwester', sans-serif;
      font-size: 25vw;
      color: #fff;
      text-shadow: 4px 4px 0 #000, 8px 8px 20px #000;
      line-height: 1;
    }

    #ko-overlay.visible span {
      animation: ko-fire 0.6s infinite, ko-appear 1s forwards;
      will-change: filter;
      text-shadow:
        0 0 12px #fff8e0,
        0 0 40px #ffaa00,
        0 0 80px #ff6600,
        0 0 120px #ff3d00;
    }

    .round-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    .round-overlay.visible {
      opacity: 1;
    }

    .round-overlay.blink-out {
      animation: ko-blink-out 0.3s steps(1, end) forwards;
    }

    .round-overlay span {
      font-family: 'Norwester', sans-serif;
      font-size: 12.5vw;
      color: #fff;
      text-shadow: 4px 4px 0 #000, 8px 8px 20px #000;
      line-height: 1;
      letter-spacing: 0.05em;
    }

    @keyframes round-appear {
      0%    { transform: scale(0.5); }
      8%    { transform: scale(0.5); }
      8.01% { transform: scale(1); }
      100%  { transform: scale(1); }
    }

    .round-overlay.visible span {
      animation: ko-fire 0.6s infinite, round-appear 0.5s steps(1, end) forwards;
      will-change: filter;
      text-shadow:
        0 0 10px #fff8e0,
        0 0 30px #ffaa00,
        0 0 60px #ff6600,
        0 0 100px #ff3d00;
    }

    .round-bar {
      height: 4px;
      background: transparent;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }

    #maxx-health ~ .round-bar {
      transform: skewX(30deg) translateX(20px);
    }

    #hammer-health ~ .round-bar {
      transform: skewX(-30deg) translateX(-20px);
    }

    .round-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      width: 0%;
    }

    #maxx-health ~ .round-bar .round-bar-fill {
      left: 0;
      background: linear-gradient(to right, #007aad, #00e5ff);
      animation: round-bar-reveal 30s linear forwards;
    }

    #hammer-health ~ .round-bar .round-bar-fill {
      right: 0;
      background: linear-gradient(to left, #7a1a3a, #fc6c85);
    }

    @keyframes round-bar-reveal {
      from { width: 0%; }
      to   { width: 100%; }
    }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s ease-out;
    }
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 10vh;
      padding-left: 70px;
      gap: 6px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.82) 100%);
      overflow: hidden;
    }

    #vs-caption {
      display: none;
      position: relative;
      z-index: 1;
      margin-bottom: 48px;
    }

    #vs-caption span {
      font-family: 'Norwester', sans-serif;
      font-size: 12.5vw;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.04em;
      animation: ko-fire 0.6s infinite;
      will-change: filter;
      text-shadow:
        0 0 10px #fff8e0,
        0 0 30px #ffaa00,
        0 0 60px #ff6600,
        0 0 100px #ff3d00;
    }

    .waveform-container {
      position: relative;
      z-index: 1;
    }

    .snippet-label {
      position: relative;
      z-index: 1;
      font-family: 'Exo 2', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: -4px;
    }

    .play-btn {
      position: absolute;
      left: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .play-btn svg {
      width: 50px;
      height: 50px;
    }
    .play-btn-cyan {
      color: #00e5ff;
      filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6));
    }
    .play-btn-cyan:hover {
      color: #80f0ff;
      filter: drop-shadow(0 0 16px rgba(0, 229, 255, 0.8));
    }
    .play-btn-pink {
      color: #fc6c85;
      filter: drop-shadow(0 0 8px rgba(252, 108, 133, 0.6));
    }
    .play-btn-pink:hover {
      color: #ff8da4;
      filter: drop-shadow(0 0 16px rgba(252, 108, 133, 0.8));
    }

    #waveform-zoom {
      position: relative;
      z-index: 1;
      width: 60vw;
      max-width: 700px;
      height: 200px;
    }

    #waveform-canvas {
      position: relative;
      z-index: 1;
      width: 80vw;
      max-width: 900px;
      height: 60px;
    }

    #info-box {
      position: relative;
      z-index: 1;
      width: 80vw;
      max-width: 900px;
      height: 250px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      gap: 10px;
      padding: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
    }

    #info-box::-webkit-scrollbar {
      height: 6px;
    }
    #info-box::-webkit-scrollbar-track {
      background: transparent;
    }
    #info-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .card {
      flex-shrink: 0;
      width: 120px;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .card.type-ATTACK {
      background: linear-gradient(135deg, rgba(140, 50, 200, 0.5), rgba(80, 20, 140, 0.6));
    }
    .card.type-DEFENSE {
      background: linear-gradient(135deg, rgba(120, 120, 120, 0.5), rgba(60, 60, 60, 0.6));
    }
    .card.type-SKILL {
      background: linear-gradient(135deg, rgba(200, 170, 50, 0.5), rgba(140, 110, 20, 0.6));
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-name {
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.2;
    }

    .card-type {
      font-family: 'Exo 2', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .card.type-ATTACK .card-type { color: #d8a0ff; }
    .card.type-DEFENSE .card-type { color: #aaa; }
    .card.type-SKILL .card-type { color: #ffd700; }

    .card-time {
      font-family: 'Exo 2', sans-serif;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    .card-moves {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .move-tag {
      font-family: 'Exo 2', sans-serif;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.05em;
    }

    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.85;
      transform: translate(-50%, -50%) scale(0.8);
    }

    #waveform-beat2 {
      position: relative;
      z-index: 1;
      width: 60vw;
      max-width: 700px;
      height: 200px;
    }

    #debug-boxes {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    .debug-panel {
      width: 180px;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      overflow-y: auto;
      padding: 10px 0;
      pointer-events: auto;
    }
    .debug-panel::-webkit-scrollbar { width: 4px; }
    .debug-panel::-webkit-scrollbar-track { background: transparent; }
    .debug-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    .debug-panel-title {
      font-family: 'Exo 2', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      padding: 4px 0 8px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1;
    }
    .debug-panel-list {
      font-family: 'Exo 2', sans-serif;
      font-size: 11px;
    }
    .debug-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 10px;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }
    .debug-row.active {
      background: rgba(255,255,255,0.1);
    }
    .debug-row .dm { font-weight: 700; color: rgba(255,255,255,0.6); }
    .debug-row .da { color: rgba(255,255,255,0.35); }
    .debug-row.active .dm { color: #fff; }
    .debug-row.active .da { color: rgba(255,255,255,0.7); }
    #debug-p1 .debug-row.active { background: rgba(0, 229, 255, 0.15); }
    #debug-p1 .debug-row.active .dm { color: #00e5ff; }
    #debug-p2 .debug-row.active { background: rgba(252, 108, 133, 0.15); }
    #debug-p2 .debug-row.active .dm { color: #fc6c85; }
    .debug-row.hover {
      background: rgba(255, 255, 255, 0.12);
    }
    .debug-row.hover .dm { color: #fff; }
    .debug-row.hover .da { color: rgba(255, 255, 255, 0.7); }

    .move-sequence {
      position: relative;
      z-index: 1;
      width: 60vw;
      max-width: 700px;
      min-height: 20px;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      letter-spacing: 0.15em;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .move-seq-item {
      padding: 2px 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      font-size: 10px;
    }
    .move-plus {
      background: rgba(255, 170, 0, 0.3);
      color: #ffcc00;
      border: 1px solid rgba(255, 170, 0, 0.5);
    }

    .ai-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: background 0.2s;
    }
    .ai-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .ai-btn.mode-on {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.6);
    }

    .picker-slide {
      position: absolute;
      top: 0;
      height: 100%;
      width: auto;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    #picker-maxx {
      left: 0;
      animation: slide-in-maxx 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    #picker-hammer {
      right: 0;
      animation: slide-in-hammer 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    @keyframes slide-in-maxx {
      from { transform: translateX(-80vw); }
      to   { transform: translateX(0); }
    }

    @keyframes slide-in-hammer {
      from { transform: translateX(80vw) scaleX(-1); }
      to   { transform: translateX(0)    scaleX(-1); }
    }

    #start-btn {
      position: relative;
      z-index: 1;
      font-family: 'Norwester', sans-serif;
      font-size: clamp(22px, 4vw, 56px);
      letter-spacing: 0.18em;
      color: #fff;
      background: transparent;
      border: 3px solid #fff;
      padding: 0.35em 1.1em;
      cursor: pointer;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 60px rgba(255,200,80,0.5);
      box-shadow: 0 0 32px rgba(255,255,255,0.25), inset 0 0 32px rgba(255,255,255,0.04);
      animation: start-btn-pulse 1.4s ease-in-out infinite;
      transition: background 0.15s;
    }

    #start-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    @keyframes start-btn-pulse {
      0%, 100% {
        box-shadow: 0 0 24px rgba(255,255,255,0.25), inset 0 0 24px rgba(255,255,255,0.04);
        text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 50px rgba(255,200,80,0.4);
      }
      50% {
        box-shadow: 0 0 60px rgba(255,255,255,0.55), 0 0 100px rgba(255,180,40,0.3), inset 0 0 32px rgba(255,255,255,0.07);
        text-shadow: 0 0 32px rgba(255,255,255,1), 0 0 80px rgba(255,200,80,0.7);
      }
    }
    @media (orientation: portrait) {
      #picker-maxx   { left:  -80vw; }
      #picker-hammer { right: -80vw; }
      #vs-caption span { font-size: 25vw; }
    }
    @media (orientation: portrait) {
      /* Let hud columns share available width and shrink to fit */
      #hud > div:first-child,
      #hud > div:last-child {
        flex: 1;
        min-width: 0;
      }
      .health-bar {
        width: 100%;
        height: 55px;
      }
      #maxx-health {
        width: 120%;
        margin-left: -5vw;
      }
      #maxx-health .player-label {
        left: 48px;
      }
      #hammer-health {
        width: 120%;
        margin-left: calc(-20% + 5vw);
      }
      #hammer-health .player-label {
        right: 48px;
      }
      #round-label {
        margin-bottom: -30px !important;
      }
      /* Base font-size (20px) is fine for the narrower portrait health bars */
      .round-bar {
        height: 8px;
      }
      #maxx-health ~ .round-bar {
        transform: skewX(30deg) translateX(25px);
      }
      #hammer-health ~ .round-bar {
        transform: skewX(-30deg) translateX(-25px);
      }
      .action-buttons {
        width: 100%;
      }
      .action-btn:not(.vote-btn) {
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 7px 5px 6px;
        font-size: 18px;
        gap: 3px;
      }
      .btn-icon {
        height: 27px;
        order: -1;
      }
      .btn-text {
        flex-direction: row;
        align-items: center;
        gap: 3px;
      }
      .btn-counter {
        font-size: 16px;
      }
      .flush-toast {
        font-size: 20px;
      }
      #round-counter {
        font-size: 75px;
      }
      .vote-btn {
        font-size: 30px;
      }
      /* Side-mounted vertical action buttons */
      #maxx-health ~ .action-buttons:not(.vote-row) {
        position: fixed;
        left: -5vw;
        top: 70%;
        transform: translateY(-50%);
        flex-direction: column;
        width: auto;
        gap: 6px;
      }
      #hammer-health ~ .action-buttons:not(.vote-row) {
        position: fixed;
        right: -5vw;
        top: 70%;
        transform: translateY(-50%);
        flex-direction: column;
        width: auto;
        gap: 6px;
      }
      /* Row layout + 30deg slant per button */
      #maxx-health ~ .action-buttons:not(.vote-row) .action-btn {
        flex-direction: row;
        align-items: center;
        padding: 16px 18px 14px 42px;
        transform: skewX(-30deg);
      }
      #hammer-health ~ .action-buttons:not(.vote-row) .action-btn {
        flex-direction: row;
        align-items: center;
        padding: 16px 42px 14px 18px;
        transform: skewX(30deg);
      }
      /* Counter-skew content so text reads upright */
      #maxx-health ~ .action-buttons:not(.vote-row) .action-btn span,
      #maxx-health ~ .action-buttons:not(.vote-row) .action-btn svg.btn-icon {
        transform: skewX(30deg);
      }
      #hammer-health ~ .action-buttons:not(.vote-row) .action-btn span,
      #hammer-health ~ .action-buttons:not(.vote-row) .action-btn svg.btn-icon {
        transform: skewX(-30deg);
      }
      /* Maxx (left side): icon on the left (towards screen edge) */
      #maxx-health ~ .action-buttons:not(.vote-row) .btn-icon {
        order: -1;
      }
      #maxx-health ~ .action-buttons:not(.vote-row) .btn-text {
        flex: 1;
        flex-direction: column;
        align-items: flex-end;
        gap: 1px;
        text-align: right;
      }
      /* Hammer (right side): icon on the right (towards screen edge) */
      #hammer-health ~ .action-buttons:not(.vote-row) .btn-icon {
        order: 1;
      }
      #hammer-health ~ .action-buttons:not(.vote-row) .btn-text {
        flex: 1;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
        text-align: left;
      }
      /* Vote buttons - skewed, tucked to their screen edge, as wide as health bars */
      #maxx-health ~ .vote-row {
        position: fixed;
        bottom: 40px;
        left: -5vw;
        right: auto;
        width: 50vw;
        transform: skewX(-30deg);
        justify-content: flex-end;
        margin-top: 0;
      }
      #hammer-health ~ .vote-row {
        position: fixed;
        bottom: 40px;
        right: -5vw;
        left: auto;
        width: 50vw;
        transform: skewX(30deg);
        justify-content: flex-start;
        margin-top: 0;
      }
      #maxx-health ~ .vote-row .vote-btn,
      #hammer-health ~ .vote-row .vote-btn {
        width: 100%;
      }
      /* Counter-skew span so text reads upright (can't counter-skew the button itself — vote-appear animation uses transform) */
      #maxx-health ~ .vote-row .vote-btn span {
        display: inline-block;
        transform: skewX(30deg);
      }
      #hammer-health ~ .vote-row .vote-btn span {
        display: inline-block;
        transform: skewX(-30deg);
      }
    }
  </style>
</head>

  <script src="lib/spine-webgl.js"></script>
  <script>
    (function() {
      var delays    = [0, 0.20, 0.40, 0.60, 0.80, 0.10, 0.30, 0.50, 0.70, 0.90, 0.15, 0.35, 0.55, 0.75, 0.25, 0.45, 0.05, 0.65, 0.85, 0.12, 0.32, 0.52, 0.72, 0.92, 0.08, 0.28, 0.48, 0.68, 0.88, 0.18, 0.38, 0.58];
      var durations = [0.65, 0.85, 0.70, 0.95, 0.75, 0.80, 0.60, 0.90, 0.70, 0.85, 0.75, 0.65, 0.95, 0.80, 0.70, 0.90, 0.60, 0.80, 0.68, 0.88, 0.72, 0.92, 0.63, 0.83, 0.77, 0.67, 0.87, 0.73, 0.93, 0.62, 0.82, 0.78];
      document.querySelectorAll('.health-bar').forEach(function(bar) {
        var wf = document.createElement('div');
        wf.className = 'waveform';
        delays.forEach(function(d, i) {
          var b = document.createElement('div');
          b.className = 'waveform-bar';
          b.style.animationDelay = d + 's';
          b.style.animationDuration = durations[i] + 's';
          wf.appendChild(b);
        });
        bar.insertBefore(wf, bar.querySelector('.player-label'));
      });
    })();

    (function () {
      var canvas = document.getElementById("game-canvas");
      var gl, renderer, assetManager, skeletonRenderer;
      var hammer, maxx;
      var lastFrameTime = Date.now() / 1000;
      var animating = false;
      var pendingVote = null;
      var health = { maxx: 100, hammer: 100 };
      var hudScale = 1, charScale = 1;

      var timersEnded = false;

      function showVoteIfPending() {
        if (pendingVote && timersEnded) {
          var voteBtn = document.querySelector('.vote-btn[data-player="' + pendingVote + '"]');
          voteBtn.style.visibility = 'visible';
          voteBtn.classList.add('vote-visible');
          pendingVote = null;
        }
      }

      function setHealth(player, value) {
        health[player] = Math.max(0, value);
        document.querySelector('#' + player + '-health .health-bar-fill').style.width = health[player] + '%';
        if (health[player] === 0) {
          pendingVote = player === "maxx" ? "hammer" : "maxx";
        }
      }

      function init() {
        var config = { alpha: true };
        gl = canvas.getContext("webgl", config) || canvas.getContext("experimental-webgl", config);
        if (!gl) {
          alert("WebGL not supported");
          return;
        }

        renderer = new spine.webgl.SceneRenderer(canvas, gl);
        assetManager = new spine.webgl.AssetManager(gl, "resources/");
        skeletonRenderer = new spine.webgl.SkeletonRenderer(gl);

        assetManager.loadTextureAtlas("HammerRigBox.atlas");
        assetManager.loadText("HammerRigBox.json");
        assetManager.loadTextureAtlas("MaxxRigBox.atlas");
        assetManager.loadText("MaxxRigBox.json");

        requestAnimationFrame(load);
      }

      function load() {
        if (!assetManager.isLoadingComplete()) {
          requestAnimationFrame(load);
          return;
        }

        hammer = createSkeleton("HammerRigBox", "Idle");
        maxx = createSkeleton("MaxxRigBox", "Idle");

        resize();
        window.addEventListener("resize", resize);
        setupButtons();
        updateRoundButtons();
        requestAnimationFrame(render);
      }

      function setButtonsDisabled(disabled) {
        document.querySelectorAll('.action-btn').forEach(function(btn) {
          btn.disabled = disabled;
        });
      }

      function playAnimationOnce(character, animName) {
        character.state.setAnimation(0, animName, false);
      }

      var bgSlot = 'a';

      function setupManualLoop(video) {
        video.addEventListener('timeupdate', function() {
          if (video.duration && video.currentTime >= video.duration - 0.15) {
            video.currentTime = 0;
          }
        });
      }

      function switchBackground(src, loop) {
        var cur = document.getElementById('bg-video-' + bgSlot);
        var nxt = document.getElementById('bg-video-' + (bgSlot === 'a' ? 'b' : 'a'));

        nxt.src = src;
        nxt.load();

        function onCanPlay() {
          nxt.removeEventListener('canplay', onCanPlay);
          nxt.play().catch(function() {});
          nxt.style.zIndex = 0;
          cur.style.zIndex = -1;
          cur.pause();
          bgSlot = bgSlot === 'a' ? 'b' : 'a';

          if (loop) {
            setupManualLoop(nxt);
          } else {
            nxt.addEventListener('timeupdate', function onNearEnd() {
              if (nxt.duration && nxt.currentTime >= nxt.duration - 0.5) {
                nxt.removeEventListener('timeupdate', onNearEnd);
                switchBackground('resources/arena_idle.webm', true);
              }
            });
          }
        }

        nxt.addEventListener('canplay', onCanPlay);
      }

      // Manual loop for the initial idle video
      setupManualLoop(document.getElementById('bg-video-a'));

      function playAnimationThenIdle(character, animName, onComplete) {
        character.state.setAnimation(0, animName, false);
        character.state.addAnimation(0, "Idle", true, 0);
        var listener = {
          complete: function(trackEntry) {
            if (trackEntry.animation.name === animName) {
              character.state.removeListener(listener);
              if (onComplete) onComplete();
            }
          }
        };
        character.state.addListener(listener);
      }

      var moveAnimMap = { PUNCH: 'Punch', 'PUNCH+': 'Punch+', BLOCK: 'Block', SUPER: 'Super', TAUNT: 'Taunt', CONT: 'SuperInt' };

      var animLookup = {
        'PUNCH:Idle':    'PUNCH:HIT',
        'PUNCH:TAUNT':   'PUNCH:HIT',
        'PUNCH:SUPER':   'PUNCH:HIT',
        'PUNCH:PUNCH':   'PARRY:PARRY',
        'PUNCH+:Idle':   'PUNCH+:HIT',
        'PUNCH+:Block':  'PUNCH+:HIT',
        'PUNCH+:PUNCH':  'PUNCH+:HIT',
        'PUNCH+:TAUNT':  'PUNCH+:HIT',
        'PUNCH+:SUPER':  'PUNCH+:HIT',
        'PUNCH+:PUNCH+': 'PARRY:PARRY',
        'BLOCK:Idle':    'BLOCK:IDLE',
        'BLOCK:TAUNT':   'BLOCK:TAUNT',
        'BLOCK:PUNCH':   'DEFLECT:PUNCH',
        'BLOCK:PUNCH+':  'HIT:PUNCH+',
        'BLOCK:SUPER':   'DOWN:SUPER',
        'SUPER:Idle':    'SUPER:HIT',
        'SUPER:Block':   'SUPER:DOWN',
        'SUPER:TAUNT':   'SUPER:DOWN',
        'CONT:Idle':     'CONT:HIT',
        'CONT:Block':    'CONT:HIT',
        'CONT:TAUNT':    'CONT:HIT',
        'CONT:PUNCH':    'CONT:HIT',
        'TAUNT:Idle':    'TAUNT:IDLE',
        'TAUNT:PUNCH':   'TAUNT:HIT',
        'TAUNT:SUPER':   'TAUNT:HIT',
        'Idle:PUNCH':    'HIT:PUNCH',
        'Idle:PUNCH+':   'HIT:PUNCH+'
      };

      var rigAnimMap = {
        PUNCH: 'Punch', 'PUNCH+': 'Punch+', BLOCK: 'Block', SUPER: 'Super', TAUNT: 'Taunt', CONT: 'SuperInt',
        HIT: 'Hit', PARRY: 'Parry', DEFLECT: 'Deflect', DOWN: 'Down', IDLE: 'Idle',
        SUPERINT: 'SuperInt', SUPERINT2: 'SuperInt2'
      };

      var superInterruptAnims = ['Parry', 'SuperInt', 'SuperInt2'];

      function playSequence(character, moves, idx) {
        if (idx >= moves.length) return;
        var anim = moveAnimMap[moves[idx]] || 'Punch';
        playAnimationThenIdle(character, anim, function() {
          playSequence(character, moves, idx + 1);
        });
      }

      var moveDurations = { PUNCH: 1, 'PUNCH+': 1, BLOCK: 1, SUPER: 1, TAUNT: 1, CONT: 1 };

      function generateTicks(cards) {
        var ticks = [];
        for (var i = 0; i < 30; i++) {
          ticks.push({ move: 'Idle', cardStart: false, cardIdx: -1 });
        }
        var sorted = cards.slice().sort(function(a, b) { return a.tick - b.tick; });
        
        sorted.forEach(function(c, cIdx) {
          var startIdx = c.tick - 1;
          var moves = c.moves || [];
          
          for (var m = 0; m < moves.length; m++) {
            var idx = startIdx + m;
            if (idx >= 0 && idx < 30) {
              ticks[idx] = { move: moves[m], cardStart: m === 0, cardIdx: cIdx, onSpike: c.onSpike && m === 0 };
            }
          }
        });
        
        return ticks;
      }

      function getCombatAnims(atkMove, defMove, atkInterrupted, defInterrupted, atkTickInMove, defTickInMove) {
        var key = atkMove + ':' + defMove;
        if (animLookup[key]) {
          var parts = animLookup[key].split(':');
          return { atk: rigAnimMap[parts[0]] || parts[0], def: rigAnimMap[parts[1]] || parts[1] };
        }
        // SUPER interrupted: use animation based on which tick was interrupted, continue for remaining
        if (atkInterrupted && atkMove.match(/^SUPER[123]$/)) {
          var anims = ['Hit', 'SuperInt', 'SuperInt2'];
          return { atk: anims[atkTickInMove], def: moveAnimMap[defMove] || defMove };
        }
        if (defInterrupted && defMove.match(/^SUPER[123]$/)) {
          var anims = ['Hit', 'SuperInt', 'SuperInt2'];
          return { atk: moveAnimMap[atkMove] || atkMove, def: anims[defTickInMove] };
        }
        // Fallback
        return {
          atk: atkInterrupted ? 'Hit' : (rigAnimMap[atkMove] || atkMove),
          def: defInterrupted ? 'Hit' : (rigAnimMap[defMove] || defMove)
        };
      }

      function buildTimedSequence(cards) {
        var events = [];
        cards.forEach(function(c) {
          var moves = c.moves || [];
          moves.forEach(function(m, idx) {
            var move = m;
            if (m === 'PUNCH' && c.onSpike && idx === 0) move = 'PUNCH+';
            events.push({ move: move, duration: moveDurations[move] || 1 });
          });
          events.push({ move: 'Idle', duration: c.downtime || 1 });
        });
        return events;
      }

      function getSortedCards(placements) {
        return placements.slice().sort(function(a, b) { return a.tick - b.tick; });
      }

      function playTimedSequence(character, events, idx) {
        if (idx >= events.length) return;
        var ev = events[idx];
        var anim = moveAnimMap[ev.move] || ev.move;
        character.state.setAnimation(0, anim, anim === 'Idle');
        setTimeout(function() {
          playTimedSequence(character, events, idx + 1);
        }, ev.duration * 1000);
      }

      // ===== COMBAT RULES =====
      // Format: [atkMove, defMove] -> { atkMove: 'newMove', atkAnim: 'newAnim', defMove: 'newMove', defAnim: 'newAnim' }
      // null means no change, 'REMOVE' means set to idle
      var combatRules = [
        // BLOCK vs PUNCH -> Defender deflects, attacker idles but keeps punch anim
        [['PUNCH', 'BLOCK'], { atkMove: 'Idle', atkAnim: 'Punch', defAnim: 'Deflect' }],
        [['PUNCH+', 'BLOCK'], { defAnim: 'Hit', atkAnim: 'Hit' }],
        
        // PUNCH vs PUNCH -> Both parry
        [['PUNCH', 'PUNCH'], { atkAnim: 'Parry', defAnim: 'Parry' }],
        [['PUNCH+', 'PUNCH+'], { atkAnim: 'Parry', defAnim: 'Parry' }],
        [['PUNCH', 'PUNCH+'], { atkAnim: 'Hit', defAnim: 'Parry' }],
        
        // TAUNT vs PUNCH+ (same tick) -> TAUNT gets hit
        [['TAUNT', 'PUNCH+'], { atkAnim: 'Hit' }],
        
        // SUPER vs PUNCH/PUNCH+ -> SUPER interrupted
        [['SUPER', 'PUNCH'], { atkMove: 'Idle', atkAnim: 'Hit' }],
        [['SUPER', 'PUNCH+'], { atkMove: 'Idle', atkAnim: 'Hit' }],
        [['PUNCH', 'SUPER'], { defMove: 'Idle', defAnim: 'Hit' }],
        
        // BLOCK vs SUPER -> defender down
        [['BLOCK', 'SUPER'], { defAnim: 'Down' }],
        
        // CONT follows the animation of previous move
      ];

      // Apply rules to timeline
      function applyCombatRules(timeline) {
        var result = [];
        
        for (var t = 0; t < timeline.length; t++) {
          var entry = timeline[t];
          var newEntry = { 
            tick: t + 1,
            p1: { move: entry.p1.move, anim: entry.p1.anim, fromTick: entry.p1.fromTick },
            p2: { move: entry.p2.move, anim: entry.p2.anim, fromTick: entry.p2.fromTick }
          };
          
          // TAUNT on P1 turns P1's own PUNCH 3 ticks later into PUNCH+
          if (entry.p1.move === 'PUNCH') {
            for (var back = Math.max(0, t - 3); back < t; back++) {
              if (result[back] && result[back].p1.move === 'TAUNT') {
                newEntry.p1.move = 'PUNCH+';
                newEntry.p1.anim = 'Hit';
                break;
              }
            }
          }
          // TAUNT on P2 turns P2's own PUNCH 3 ticks later into PUNCH+
          if (entry.p2.move === 'PUNCH') {
            for (var back = Math.max(0, t - 3); back < t; back++) {
              if (result[back] && result[back].p2.move === 'TAUNT') {
                newEntry.p2.move = 'PUNCH+';
                newEntry.p2.anim = 'Hit';
                break;
              }
            }
          }
          
          // Find matching rule (check both directions)
          var ruleFound = false;
          for (var r = 0; r < combatRules.length; r++) {
            var rule = combatRules[r];
            var moves = rule[0];
            // Check forward direction
            if (moves[0] === entry.p1.move && moves[1] === entry.p2.move) {
              var changes = rule[1];
              if (changes.atkMove) newEntry.p1.move = changes.atkMove === 'REMOVE' ? 'Idle' : changes.atkMove;
              if (changes.atkAnim) newEntry.p1.anim = changes.atkAnim;
              if (changes.defMove) newEntry.p2.move = changes.defMove === 'REMOVE' ? 'Idle' : changes.defMove;
              if (changes.defAnim) newEntry.p2.anim = changes.defAnim;
              ruleFound = true;
              break;
            }
            // Check reverse direction
            if (moves[0] === entry.p2.move && moves[1] === entry.p1.move) {
              var changes = rule[1];
              if (changes.defMove) newEntry.p1.move = changes.defMove === 'REMOVE' ? 'Idle' : changes.defMove;
              if (changes.defAnim) newEntry.p1.anim = changes.defAnim;
              if (changes.atkMove) newEntry.p2.move = changes.atkMove === 'REMOVE' ? 'Idle' : changes.atkMove;
              if (changes.atkAnim) newEntry.p2.anim = changes.atkAnim;
              ruleFound = true;
              break;
            }
          }
          
          // Handle CONT - follows previous animation
          if (newEntry.p1.move === 'CONT' && t > 0) {
            newEntry.p1.anim = result[t-1].p1.anim;
          }
          if (newEntry.p2.move === 'CONT' && t > 0) {
            newEntry.p2.anim = result[t-1].p2.anim;
          }
          
          // IDLE default animation
          if (newEntry.p1.move === 'Idle') newEntry.p1.anim = 'Idle';
          if (newEntry.p2.move === 'Idle') newEntry.p2.anim = 'Idle';
          
          result.push(newEntry);
        }
        
        return result;
      }

      function generateTicks(cards) {
        var ticks = [];
        for (var i = 0; i < 30; i++) {
          ticks.push({ move: 'Idle', cardStart: false, cardIdx: -1 });
        }
        var sorted = cards.slice().sort(function(a, b) { return a.tick - b.tick; });
        
        sorted.forEach(function(c, cIdx) {
          var startIdx = c.tick - 1;
          var moves = c.moves || [];
          
          for (var m = 0; m < moves.length; m++) {
            var idx = startIdx + m;
            if (idx >= 0 && idx < 30) {
              ticks[idx] = { move: moves[m], cardStart: m === 0, cardIdx: cIdx, onSpike: c.onSpike && m === 0 };
            }
          }
        });
        
        return ticks;
      }

      function processCombat(atkTicks, defTicks, roundNum) {
        // Create initial timeline
        var timeline = [];
        for (var t = 0; t < 30; t++) {
          var atkTick = atkTicks[t] || { move: 'Idle', cardStart: false };
          var defTick = defTicks[t] || { move: 'Idle', cardStart: false };
          
          // Determine animations based on moves
          var atkAnim = rigAnimMap[atkTick.move] || 'Idle';
          var defAnim = rigAnimMap[defTick.move] || 'Idle';
          
          // CONT gets animation from previous tick later
          var fromTick = null;
          if (atkTick.move === 'CONT' && t > 0) {
            atkAnim = 'CONT';
            fromTick = t;
          }
          if (defTick.move === 'CONT' && t > 0) {
            defAnim = 'CONT';
          }
          
          timeline.push({
            p1: { move: atkTick.move, anim: atkAnim, fromTick: fromTick },
            p2: { move: defTick.move, anim: defAnim, fromTick: null }
          });
        }
        
        // Apply combat rules
        var finalTimeline = applyCombatRules(timeline);
        
        // Convert to old format for now
        var results = [];
        for (var i = 0; i < finalTimeline.length; i++) {
          results.push({
            atkMove: finalTimeline[i].p1.move,
            defMove: finalTimeline[i].p2.move,
            atkAnim: finalTimeline[i].p1.anim,
            defAnim: finalTimeline[i].p2.anim,
            atkDamage: 0,
            defDamage: 0
          });
        }
        
        return results;
      }

      var debugTickInterval = null;

      // Format move with tick for display
      function formatMove(entry, tick) {
        var move = entry.move;
        var anim = entry.anim;
        tick = tick || 1;
        
        if (move === 'CONT') {
          var fromTick = entry.fromTick || (tick - 1);
          return 'CONT(' + tick + ',' + fromTick + ')';
        }
        return move + '(' + tick + ',' + anim + ')';
      }

      function showDebugTimeline(timeline, roundNum, autoPlay, showBox) {
        if (debugTickInterval) clearInterval(debugTickInterval);
        var p1List = document.getElementById('debug-p1-list');
        var p2List = document.getElementById('debug-p2-list');
        p1List.innerHTML = '';
        p2List.innerHTML = '';
        if (showBox || window.debugEnabled) document.getElementById('debug-boxes').style.display = 'flex';

        // Normalize timeline to new format if needed
        var processedTimeline;
        if (timeline[0] && timeline[0].p1) {
          processedTimeline = applyCombatRules(timeline);
        } else {
          // Convert old format to new format
          var normalized = timeline.map(function(r, t) {
            return {
              tick: t + 1,
              p1: { move: r.atkMove, anim: r.atkAnim, fromTick: null, originalMove: r.atkMove },
              p2: { move: r.defMove, anim: r.defAnim, fromTick: null, originalMove: r.defMove }
            };
          });
          // Apply rules BEFORE converting to CONT, so Idle changes are preserved
          var afterRules = applyCombatRules(normalized);
          // Now convert to CONT format - but only if original move was Idle
          var p1Origin = 0;
          var p2Origin = 0;
          normalized = afterRules.map(function(r, t) {
            var newP1 = Object.assign({}, r.p1);
            var newP2 = Object.assign({}, r.p2);
            // Track where moves start (after rules applied)
            // Only convert to CONT if original move was Idle (not changed by rule)
            if (r.p1.move !== 'Idle') {
              p1Origin = r.tick;
            } else if (t > 0 && r.originalMove === 'Idle') {
              newP1.move = 'CONT';
              newP1.fromTick = p1Origin;
            }
            if (r.p2.move !== 'Idle') {
              p2Origin = r.tick;
            } else if (t > 0 && r.originalMove === 'Idle') {
              newP2.move = 'CONT';
              newP2.fromTick = p2Origin;
            }
            return { tick: r.tick, p1: newP1, p2: newP2 };
          });
          processedTimeline = normalized;
        }

        processedTimeline.forEach(function(r, i) {
          var tick = i + 1;
          var p1Entry, p2Entry;
          if (roundNum === 1) {
            p1Entry = r.p1;
            p2Entry = r.p2;
          } else {
            p1Entry = r.p2;
            p2Entry = r.p1;
          }
          
          var p1Display = formatMove(p1Entry, tick) + ':' + formatMove(p2Entry, tick);
          
          var row1 = document.createElement('div');
          row1.className = 'debug-row';
          row1.id = 'p1-' + i;
          row1.dataset.idx = i;
          row1.innerHTML = '<span class="dm">' + p1Display + '</span>';
          row1.addEventListener('mouseenter', function() {
            document.querySelectorAll('.debug-row.hover').forEach(function(el) { el.classList.remove('hover'); });
            var idx = this.dataset.idx;
            this.classList.add('hover');
            var other = document.getElementById('p2-' + idx);
            if (other) other.classList.add('hover');
          });
          row1.addEventListener('mouseleave', function() {
            document.querySelectorAll('.debug-row.hover').forEach(function(el) { el.classList.remove('hover'); });
          });
          p1List.appendChild(row1);

          var row2 = document.createElement('div');
          row2.className = 'debug-row';
          row2.id = 'p2-' + i;
          row2.dataset.idx = i;
          row2.innerHTML = '<span class="dm">' + p1Display.split(':')[1] + '</span>';

            if (other) other.classList.add('hover');
          });
          row2.addEventListener('mouseleave', function() {
            document.querySelectorAll('.debug-row.hover').forEach(function(el) { el.classList.remove('hover'); });
          });
          p2List.appendChild(row2);
        });

        if (autoPlay) {
          var tickIdx = 0;
          debugTickInterval = setInterval(function() {
            if (tickIdx >= timeline.length) {
              clearInterval(debugTickInterval);
              return;
            }
            var prev = tickIdx - 1;
            if (prev >= 0) {
              var p1 = document.getElementById('p1-' + prev);
              var p2 = document.getElementById('p2-' + prev);
              if (p1) p1.classList.remove('active');
              if (p2) p2.classList.remove('active');
            }
            var c1 = document.getElementById('p1-' + tickIdx);
            var c2 = document.getElementById('p2-' + tickIdx);
            if (c1) { c1.classList.add('active'); c1.scrollIntoView({ block: 'nearest' }); }
            if (c2) { c2.classList.add('active'); c2.scrollIntoView({ block: 'nearest' }); }
            tickIdx++;
          }, 1000);
        }
      }

      function playCombat(atkChar, defChar, combatResults, roundNum) {
        var idx = 0;
        var lastAtkAnim = '';
        var lastDefAnim = '';

        var combatInterval = setInterval(function() {
          if (idx >= combatResults.length) {
            clearInterval(combatInterval);
            return;
          }
          var r = combatResults[idx];

          if (r.atkAnim !== lastAtkAnim) {
            atkChar.state.setAnimation(0, r.atkAnim, r.atkAnim === 'Idle');
            lastAtkAnim = r.atkAnim;
          }
          if (r.defAnim !== lastDefAnim) {
            defChar.state.setAnimation(0, r.defAnim, r.defAnim === 'Idle');
            lastDefAnim = r.defAnim;
          }

          // Apply damage at end of second
          setTimeout(function() {
            if (r.atkDamage > 0 || r.defDamage > 0) {
              var atkTarget = roundNum === 1 ? 'hammer' : 'maxx';
              var defTarget = roundNum === 1 ? 'maxx' : 'hammer';

              if (r.atkDamage > 0) {
                var newH = Math.max(0, health[atkTarget] - r.atkDamage);
                setHealth(atkTarget, newH);
                if (newH <= 0) {
                  clearInterval(combatInterval);
                  var loser = atkTarget === 'maxx' ? maxx : hammer;
                  var winner = atkTarget === 'maxx' ? hammer : maxx;
                  loser.state.setAnimation(0, 'Down', false);
                  winner.state.setAnimation(0, 'Idle', true);
                  return;
                }
              }

              if (r.defDamage > 0) {
                var newH2 = Math.max(0, health[defTarget] - r.defDamage);
                setHealth(defTarget, newH2);
                if (newH2 <= 0) {
                  clearInterval(combatInterval);
                  var loser2 = defTarget === 'maxx' ? maxx : hammer;
                  var winner2 = defTarget === 'maxx' ? hammer : maxx;
                  loser2.state.setAnimation(0, 'Down', false);
                  winner2.state.setAnimation(0, 'Idle', true);
                  return;
                }
              }
            }
          }, 900);
          idx++;
        }, 1000);
        window.currentCombatInterval = combatInterval;
      }

      function fireAction(attacker, defender, attackAnim, defendAnim) {
        if (animating) return;
        animating = true;
        var completed = 0;
        function onComplete() {
          if (++completed >= 2) {
            animating = false;
            showVoteIfPending();
          }
        }
        playAnimationThenIdle(attacker, attackAnim, onComplete);
        playAnimationThenIdle(defender, defendAnim, onComplete);
      }

        var atlas = assetManager.get(name + ".atlas");
        var atlasLoader = new spine.AtlasAttachmentLoader(atlas);
        var skeletonJson = new spine.SkeletonJson(atlasLoader);
        skeletonJson.scale = 1.0;

        var skeletonData = skeletonJson.readSkeletonData(assetManager.get(name + ".json"));
        var skeleton = new spine.Skeleton(skeletonData);
        skeleton.setSlotsToSetupPose();

        var stateData = new spine.AnimationStateData(skeletonData);

      function render() {
        var now = Date.now() / 1000;
        var delta = now - lastFrameTime;
        lastFrameTime = now;

        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        var w = canvas.width;
        var h = canvas.height;

        // Position characters on the arena floor
        var groundY = h * 0.15 + 220;

        var charSpacing = 150 * charScale;

        // Maxx on the left (facing right)
        maxx.skeleton.x = w / 2 - charSpacing;
        maxx.skeleton.y = groundY;
        maxx.skeleton.scaleX = charScale;
        maxx.skeleton.scaleY = charScale;
        maxx.state.update(delta);
        maxx.state.apply(maxx.skeleton);
        maxx.skeleton.updateWorldTransform();

        // Hammer on the right (flipped to face left)
        hammer.skeleton.x = w / 2 + charSpacing;
        hammer.skeleton.y = groundY;
        hammer.skeleton.scaleX = -charScale;
        hammer.skeleton.scaleY = charScale;
        hammer.state.update(delta);
        hammer.state.apply(hammer.skeleton);
        hammer.skeleton.updateWorldTransform();

        renderer.camera.position.x = w / 2;
        renderer.camera.position.y = h / 2;
        renderer.camera.setViewport(w, h);

        renderer.begin();
        renderer.drawSkeleton(hammer.skeleton, true);
        renderer.drawSkeleton(maxx.skeleton, true);
        renderer.end();

      function fadeOutBeat(audio, duration) {
        var steps = 40;
        var stepMs = Math.max(duration / steps, 16);
        var startVol = audio.volume;
        var step = 0;
        var iv = setInterval(function() {
          step++;
          audio.volume = Math.max(0, startVol * (1 - step / steps));
          if (step >= steps) {
            clearInterval(iv);
            audio.pause();
            audio.volume = 1;
          }
        }, stepMs);
      }

      (function() {
        var wfCanvas = document.getElementById('waveform-canvas');
        var wfCtx = wfCanvas.getContext('2d');
        var zmCanvas = document.getElementById('waveform-zoom');
        var zmCtx = zmCanvas.getContext('2d');
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.sharedAudioCtx = audioCtx;

        function resizeWf() {
          wfCanvas.width = wfCanvas.offsetWidth * (window.devicePixelRatio || 1);
          wfCanvas.height = wfCanvas.offsetHeight * (window.devicePixelRatio || 1);
          zmCanvas.width = zmCanvas.offsetWidth * (window.devicePixelRatio || 1);
          zmCanvas.height = zmCanvas.offsetHeight * (window.devicePixelRatio || 1);
        }
        resizeWf();
        window.addEventListener('resize', function() { resizeWf(); drawWaveform(wfData); });

        var wfData = null;
        var wfDuration = 0;
        var windowPos = 0;

        function roundRect(ctx, x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.arcTo(x + w, y, x + w, y + r, r);
          ctx.lineTo(x + w, y + h - r);
          ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
          ctx.lineTo(x + r, y + h);
          ctx.arcTo(x, y + h, x, y + h - r, r);
          ctx.lineTo(x, y + r);
          ctx.arcTo(x, y, x + r, y, r);
          ctx.closePath();
        }
        window.roundRect = roundRect;

        function drawWaveform(data) {
          if (!data || !wfDuration) return;
          var w = wfCanvas.width;
          var h = wfCanvas.height;
          var dpr = window.devicePixelRatio || 1;
          wfCtx.clearRect(0, 0, w, h);

          var len = data.length;
          var barW = 4 * dpr;
          var gap = 4 * dpr;
          var totalBars = Math.floor(w / (barW + gap));
          var step = Math.ceil(len / totalBars);
          var mid = h / 2;
          var barRadius = barW / 2;

          for (var i = 0; i < totalBars; i++) {
            var x = i * (barW + gap);
            var start = i * step;
            var end = Math.min(start + step, len);

            '<div class="card-name">' + c.name + '</div>' +
            '<div class="card-type">' + c.type + '</div>' +
            '<div class="card-time">' + c.time + 's</div>' +
            '<div class="card-moves">' + c.moves.filter(function(m) { return m !== 'IDLE' && m !== 'CONT'; }).map(function(m) { return '<span class="move-tag">' + m + '</span>'; }).join('') + '</div>';
          el.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            dragCard = c;
            dragEl = el;
            ghost.innerHTML = el.outerHTML;
            ghost.style.display = 'block';
            ghost.style.width = el.offsetWidth + 'px';
            ghost.style.left = e.clientX + 'px';
            ghost.style.top = e.clientY + 'px';
            el.style.opacity = '0.3';
          });
          return el;
        }

        cards.forEach(function(c) {
          box.appendChild(createCardEl(c));
        });

        window.addEventListener('pointermove', function(e) {
          if (!dragCard) return;
          ghost.style.left = e.clientX + 'px';
          ghost.style.top = e.clientY + 'px';

          var zmRect = zmCanvas.getBoundingClientRect();
          var b2Rect = b2Canvas.getBoundingClientRect();
          window.dragPreview = null;

          if (e.clientX >= zmRect.left && e.clientX <= zmRect.right &&
              e.clientY >= zmRect.top && e.clientY <= zmRect.bottom) {
            var localPos = (e.clientX - zmRect.left) / zmRect.width;
            var snappedTick = Math.max(1, Math.min(30, Math.round(localPos * 30) + 1));
            var visualBar = (snappedTick - 1) / 30;
            var restricted = snappedTick < 11 && dragCard.type !== 'SKILL';
            var overflows = snappedTick + dragCard.time > 31;
            var overlaps = overflows || restricted || window.beat1Placements.some(function(p) {
              var pEnd = p.tick + p.time;
              return snappedTick < pEnd && snappedTick + dragCard.time > p.tick;
            });
            window.dragPreview = { canvas: 'zoom', bar: visualBar, time: dragCard.time, type: dragCard.type, name: dragCard.name, overlap: overlaps };
            window.redrawWaveforms();
          } else if (e.clientX >= b2Rect.left && e.clientX <= b2Rect.right &&
                     e.clientY >= b2Rect.top && e.clientY <= b2Rect.bottom) {
            var localPos2 = (e.clientX - b2Rect.left) / b2Rect.width;
            var snappedTick2 = Math.max(1, Math.min(30, Math.round(localPos2 * 30) + 1));
            var snappedBar2 = (snappedTick2 - 1) / 30;
            var overflows2 = snappedTick2 + dragCard.time > 31;
            var restricted2 = snappedTick2 < 11 && dragCard.type !== 'SKILL';
            var overlaps2 = overflows2 || restricted2 || window.beat2Placements.some(function(p) {
              var pEnd2 = p.tick + p.time;
              return snappedTick2 < pEnd2 && snappedTick2 + dragCard.time > p.tick;
            });
            window.dragPreview = { canvas: 'beat2', bar: snappedBar2, time: dragCard.time, type: dragCard.type, name: dragCard.name, overlap: overlaps2 };
            window.redrawBeat2();
          } else {
            window.redrawWaveforms();
            window.redrawBeat2();
          }
        });

        window.addEventListener('pointerup', function(e) {
          if (!dragCard) return;

          var ghostCard = ghost.querySelector('.card');
          if (ghostCard) ghostCard.style.transform = '';

          ghost.style.display = 'none';
          window.dragPreview = null;
          window.redrawWaveforms();
          window.redrawBeat2();

          var zmRect = zmCanvas.getBoundingClientRect();
          var b2Rect = b2Canvas.getBoundingClientRect();

          var dropped = false;

          if (e.clientX >= zmRect.left && e.clientX <= zmRect.right &&
              e.clientY >= zmRect.top && e.clientY <= zmRect.bottom) {
            var localPos = (e.clientX - zmRect.left) / zmRect.width;
            var snappedTick = Math.max(1, Math.min(30, Math.round(localPos * 30) + 1));
            var restricted = snappedTick < 11 && dragCard.type !== 'SKILL';
            var overflows = snappedTick + dragCard.time > 31;
            var overlaps = overflows || restricted || window.beat1Placements.some(function(p) {
              var pEnd = p.tick + p.time;
              return snappedTick < pEnd && snappedTick + dragCard.time > p.tick;
            });
            if (!overlaps) {
              var onSpike = window.beat1Spikes && window.beat1Spikes.indexOf(snappedTick - 1) !== -1;
              var isFirst = window.beat1Placements.length === 0;
              window.beat1Placements.push({ name: dragCard.name, type: dragCard.type, time: dragCard.time, tick: snappedTick, moves: dragCard.moves, onSpike: onSpike });
              window.redrawWaveforms();
              if (isFirst) window.lockSnippet();
              dropped = true;
            }
          }

          if (!dropped &&
              e.clientX >= b2Rect.left && e.clientX <= b2Rect.right &&
              e.clientY >= b2Rect.top && e.clientY <= b2Rect.bottom) {
            var localPos2 = (e.clientX - b2Rect.left) / b2Rect.width;
            var snappedTick2 = Math.max(1, Math.min(30, Math.round(localPos2 * 30) + 1));
            var overflows2 = snappedTick2 + dragCard.time > 31;
            var restricted2 = snappedTick2 < 11 && dragCard.type !== 'SKILL';
            var overlaps2 = overflows2 || restricted2 || window.beat2Placements.some(function(p) {
              var pEnd2 = p.tick + p.time;
              return snappedTick2 < pEnd2 && snappedTick2 + dragCard.time > p.tick;
            });
            if (!overlaps2) {
              var onSpike2 = window.beat2Spikes && window.beat2Spikes.indexOf(snappedTick2 - 1) !== -1;
              window.beat2Placements.push({ name: dragCard.name, type: dragCard.type, time: dragCard.time, tick: snappedTick2, moves: dragCard.moves, onSpike: onSpike2 });
              window.redrawBeat2();
              dropped = true;
            }
          }

          if (dropped) {
            dragEl.remove();
          } else {
            dragEl.style.opacity = '1';
          }

          dragCard = null;
          dragEl = null;
        });

        function addCardToBox(c) {
          box.appendChild(createCardEl(c));
        }

        zmCanvas.addEventListener('click', function(e) {
          if (window.beat1Placements.length === 0) return;
          var rect = zmCanvas.getBoundingClientRect();
          var localPos = (e.clientX - rect.left) / rect.width;
          var clickTick = Math.round(localPos * 30) + 1;

          for (var i = window.beat1Placements.length - 1; i >= 0; i--) {
            var p = window.beat1Placements[i];
            var pEnd = p.tick + p.time;
            if (clickTick >= p.tick && clickTick < pEnd) {
              window.beat1Placements.splice(i, 1);
              window.redrawWaveforms();
              addCardToBox({ name: p.name, type: p.type, time: p.time, moves: cards.find(function(c) { return c.name === p.name; }).moves });
              break;
            }
          }
        });

        b2Canvas.addEventListener('click', function(e) {
          if (window.beat2Placements.length === 0) return;
          var rect = b2Canvas.getBoundingClientRect();
          var clickTick = Math.round((e.clientX - rect.left) / rect.width * 30) + 1;

          for (var i = window.beat2Placements.length - 1; i >= 0; i--) {
            var p = window.beat2Placements[i];
            var pEnd = p.tick + p.time;
            if (clickTick >= p.tick && clickTick < pEnd) {
              window.beat2Placements.splice(i, 1);
              window.redrawBeat2();
              addCardToBox({ name: p.name, type: p.type, time: p.time, moves: cards.find(function(c) { return c.name === p.name; }).moves });
              break;
            }
          }
        });
      })();

      var currentSource = null;

      var audio1 = new Audio('resources/Beat1.mp3');
      var audio2 = new Audio('resources/Beat2.mp3');

      document.getElementById('play-btn-1').addEventListener('click', function() {
        audio2.pause();
        audio1.currentTime = window.getBeat1WindowPos() * (window.getBeat1Duration() - 30);
        audio1.play();
      });

      document.getElementById('play-btn-2').addEventListener('click', function() {
        audio1.pause();
        var startTime = window.getBeat2Start() / window.beat2Buffer.sampleRate;
        audio2.currentTime = startTime;
        audio2.play();
      });

      // AI opponent
      var allCards = [
        { name: 'Hit', type: 'ATTACK', time: 2, uptime: 1, downtime: 1, moves: ['PUNCH'] },
        { name: 'Triple Hit', type: 'ATTACK', time: 5, uptime: 3, downtime: 2, moves: ['PUNCH', 'PUNCH', 'PUNCH'] },
        { name: 'Sucker Punch', type: 'ATTACK', time: 3, uptime: 2, downtime: 1, moves: ['BLOCK', 'PUNCH'] },
        { name: 'Power Glove', type: 'ATTACK', time: 5, uptime: 3, downtime: 2, moves: ['SUPER'] },
        { name: 'Doom', type: 'ATTACK', time: 8, uptime: 5, downtime: 3, moves: ['PUNCH', 'PUNCH', 'SUPER'] },
        { name: 'Deflect', type: 'DEFENSE', time: 2, uptime: 1, downtime: 1, moves: ['BLOCK'] },
        { name: 'Turtle', type: 'DEFENSE', time: 5, uptime: 3, downtime: 2, moves: ['BLOCK', 'PUNCH', 'BLOCK'] },
        { name: 'Smartass', type: 'DEFENSE', time: 5, uptime: 3, downtime: 2, moves: ['BLOCK', 'TAUNT'] },
        { name: 'Wait Your Moment', type: 'DEFENSE', time: 8, uptime: 5, downtime: 3, moves: ['BLOCK', 'BLOCK', 'SUPER'] },
        { name: 'Boost Morale', type: 'SKILL', time: 3, uptime: 2, downtime: 1, moves: ['TAUNT'] }
      ];

      function scoreAttackSequence(cards) {
        var moves = [];
        cards.forEach(function(c) { c.moves.forEach(function(m) { moves.push(m); }); });
        var score = 0;
        for (var i = 0; i < moves.length; i++) {
          if (moves[i] === 'SUPER') score += 3;
          if (moves[i] === 'PUNCH') {
            if (i > 0 && moves[i - 1] === 'TAUNT') score += 2;
            else score += 0.5;
          }
          if (moves[i] === 'TAUNT' && i < moves.length - 1 && moves[i + 1] === 'PUNCH') score += 1;
        }
        return score;
      }

      function scoreDefendSequence(cards) {
        var moves = [];
        cards.forEach(function(c) { c.moves.forEach(function(m) { moves.push(m); }); });
        var score = 0;
        moves.forEach(function(m) {
          if (m === 'BLOCK') score += 2;
          if (m === 'SUPER') score += 1;
        });
        return score;
      }

      function generateSequence(pool, scorer) {
        var best = [];
        for (var attempt = 0; attempt < 200; attempt++) {
          var shuffled = pool.slice().sort(function() { return Math.random() - 0.5; });
          var picked = [];
          var used = 30;
          for (var i = 0; i < shuffled.length && used > 0; i++) {
            if (shuffled[i].time <= used) {
              picked.push(shuffled[i]);
              used -= shuffled[i].time;
            }
          }
          if (scorer(picked) > scorer(best)) best = picked;
        }
        return best;
      }

      function generateAttacking() {
        var attackPool = allCards.filter(function(c) { return c.type === 'ATTACK' || c.type === 'SKILL'; });
        return generateSequence(attackPool, scoreAttackSequence);
      }

      function generateDefending() {
        var defendPool = allCards.filter(function(c) { return c.type === 'DEFENSE'; });
        return generateSequence(defendPool, scoreDefendSequence);
      }

      function processMoves(cards) {
        var moves = [];
        cards.forEach(function(c) { c.moves.forEach(function(m) { moves.push(m); }); });
        return moves;
      }

      var aiAtk = generateAttacking();
      var aiDef = generateDefending();

      // Add pos values to AI cards
      var aiAtkPos = 0;
      aiAtk.forEach(function(c) { c.tick = aiAtkPos; aiAtkPos += c.time; });
      var aiDefPos = 0;
      aiDef.forEach(function(c) { c.tick = aiDefPos; aiDefPos += c.time; });

      var hitCards = [];
      for (var i = 0; i < 14; i++) {
        hitCards.push({ name: 'Hit', type: 'ATTACK', time: 2, uptime: 1, downtime: 1, moves: ['PUNCH'], tick: i * 2 + 1 });
      }
      window.aiAtkCards = hitCards.slice();
      window.aiDefCards = hitCards.slice();

      var idleCards = [];
      for (var j = 0; j < 30; j++) {
        idleCards.push({ name: 'Idle', type: 'DEFENSE', time: 1, uptime: 0, downtime: 1, moves: ['Idle'], tick: j + 1 });
      }
      window.idleAtkCards = idleCards.slice();
      window.idleDefCards = idleCards.slice();

      var hitBtn = document.getElementById('ai-mode-btn');
      var aiBtn = document.getElementById('ai-popup-btn');
      var idleBtn = document.getElementById('idle-mode-btn');
      var aiMode = 0; // 0 = HIT, 1 = AI, 2 = IDLE

      function updateMode() {
        hitBtn.classList.toggle('mode-on', aiMode === 0);
        aiBtn.classList.toggle('mode-on', aiMode === 1);
        idleBtn.classList.toggle('mode-on', aiMode === 2);
        if (aiMode === 1) {
          window.aiAtkCards = aiAtk.slice();
          window.aiDefCards = aiDef.slice();
        } else if (aiMode === 2) {
          window.aiAtkCards = idleAtkCards.slice();
          window.aiDefCards = idleDefCards.slice();
        } else {
          window.aiAtkCards = hitCards.slice();
          window.aiDefCards = hitCards.slice();
        }
        if (window.debugEnabled) window.updateDebugTimeline();
      }

      hitBtn.addEventListener('click', function() {
        aiMode = 0;
        updateMode();
      });
      aiBtn.addEventListener('click', function() {
        aiMode = 1;
        updateMode();
      });
      idleBtn.addEventListener('click', function() {
        aiMode = 2;
        updateMode();
      });
      updateMode();

      init();
    })();
  </script>
</body>
</html>
