<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preload" href="resources/arena_p1win.webm" as="video" type="video/webm">
  <link rel="preload" href="resources/arena_p2win.webm" as="video" type="video/webm">
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/norwester">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700&display=swap">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="drag-ghost" style="display:none"></div>
  <div id="drag-ghost-info" style="display:none"></div>
  <div id="start-screen">
    <video id="fire-video" src="resources/fire.mp4" autoplay loop muted playsinline></video>
    <img id="logo" src="resources/logo.webp" alt="">
    <img id="picker-player2" class="picker-slide" src="resources/picker_hammer.webp" alt="">
    <img id="picker-player1"   class="picker-slide" src="resources/picker_maxx.webp"   alt="">
    <div id="vs-caption"><span>VS</span></div>
    <div id="character-select">
      <div class="char-select-row">
        <label>PLAYER 1</label>
        <select id="player1-char-select">
          <option value="Maxx">Maxx</option>
          <option value="Hammer">Hammer</option>
        </select>
      </div>
      <div class="char-select-row">
        <label>PLAYER 2</label>
        <select id="player2-char-select">
          <option value="Hammer">Hammer</option>
          <option value="Maxx">Maxx</option>
        </select>
      </div>
    </div>
    <div class="select-bit-label">
  <div>PICK A 30 SECOND BIT</div>
  <div style="font-size:0.7em">3 TALLEST BARS ARE YOUR POWER BOOSTERS</div>
</div>
    <div style="position:relative;display:inline-block;">
      <canvas id="waveform-canvas"></canvas>
      <div id="snippet-time-display" style="font-family:'Exo 2',sans-serif;font-size:14px;font-weight:700;color:#fff;text-shadow:0 0 4px #000, 0 2px 8px rgba(0,0,0,0.8);position:absolute;left:50%;transform:translate(-50%,0);top:45px;z-index:10;display:none;pointer-events:none;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;">0:00 / 0:00</div>
    </div>
    <div class="attacking-section">
      <div class="label-row">
        <span class="intro-label">INTRO</span>
        <span class="snippet-label">PLAYER 1 SEQUENCE</span>
      </div>
      <div class="waveform-container">
        <button class="play-btn play-btn-cyan" id="play-btn-1">
          <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
          <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <canvas id="waveform-zoom"></canvas>
      </div>
      <div id="move-seq-1" class="move-sequence"></div>
    </div>
    <div id="info-box"></div>
    <button id="scroll-left-btn" class="scroll-arrow-btn" style="display:none">&#8249;</button>
    <button id="scroll-right-btn" class="scroll-arrow-btn" style="display:none">&#8250;</button>
    <div class="defending-section">
      <div id="move-seq-2" class="move-sequence"></div>
      <div class="waveform-container">
        <button class="play-btn play-btn-pink" id="play-btn-2" style="display:none">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
        </button>
        <canvas id="waveform-beat2"></canvas>
      </div>
      <div class="label-row">
        <span class="intro-label" style="display:none">INTRO</span>
        <span class="snippet-label">PLAYER 2 SEQUENCE</span>
      </div>
    </div>
    <div id="mode-controls">
      <button id="confirm-btn">Confirm Beat</button>
      <button id="ai-mode-btn" class="ai-btn" style="position:static;display:none">HIT</button>
      <button id="ai-popup-btn" class="ai-btn" style="position:static;display:none">AI</button>
      <button id="idle-mode-btn" class="ai-btn" style="position:static;display:none">IDLE</button>
      <button id="debug-btn" class="ai-btn" style="position:static;display:none">Debug</button>
      <button id="p2-edit-btn" class="ai-btn" style="position:static;display:none">Edit P2</button>
      <button id="start-btn" class="ai-btn" style="display:none;position:static;font-size:18px;padding:10px 24px;" disabled>Start Battle</button>
    </div>
  </div>
  <div id="flash"></div>
  <button id="mute-btn" class="mute-btn" style="display:none">🔊</button>
  <button id="info-toggle-btn" class="mute-btn" style="display:none">?</button>
  <div id="round1-overlay" class="round-overlay"><span>ROUND 1</span></div>
  <div id="round2-overlay" class="round-overlay"><span>ROUND 2</span></div>
  <div id="fight-overlay" class="round-overlay"><span>FIGHT</span></div>
  <div id="vote-overlay" class="round-overlay"><span>VOTE NOW</span></div>
  <div id="flush-brothers-overlay" class="round-overlay"><span>FLUSH BROTHERS</span></div>
  <div id="winner-overlay" class="round-overlay"><span></span></div>
  <div id="ko-overlay"><span>K.O.</span></div>
  <video id="bg-video-a" class="bg-video" src="resources/arena_idle.webm" autoplay muted playsinline style="z-index:0"></video>
  <video id="bg-video-b" class="bg-video" muted playsinline style="z-index:-1"></video>
  <canvas id="game-canvas" style="display:none"></canvas>
  <video id="hype-video" src="resources/hype.webm" autoplay loop muted playsinline></video>

  <div id="hud" style="display:none">
    <div>
      <div id="player1-health" class="health-bar">
        <div class="health-bar-fill"></div>
        <div class="player-label" id="player1-label">MAXX</div>
        <canvas id="p1-waveform" class="health-waveform"></canvas>
      </div>
      <div class="round-bar"><div class="round-bar-fill"></div></div>
      <div class="action-buttons" style="justify-content: flex-end;">
        <button class="action-btn" data-player="player1" data-action="fyre"><div class="btn-text"><span>Fyre</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 57 79" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M30.725,78.321 C29.517,78.356 28.359,78.329 27.227,78.272 C32.277,76.806 36.778,69.952 34.759,61.942 C32.479,52.897 23.573,54.229 24.192,44.598 C10.646,57.102 15.247,73.728 22.182,77.696 C-2.748,72.999 -5.191,43.785 9.525,30.487 C23.529,17.833 25.196,9.315 27.138,0.076 C27.138,0.076 41.318,10.225 41.652,19.400 C41.985,28.575 32.995,33.722 37.607,38.032 C42.218,42.342 48.685,37.042 47.472,32.220 C61.107,46.792 63.504,77.371 30.725,78.321 Z"/></svg></button>
        <button class="action-btn" data-player="player1" data-action="mid"><div class="btn-text"><span>Mid</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 72 71" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M36.035,70.859 C16.445,70.859 0.563,55.017 0.563,35.476 C0.563,15.935 16.445,0.094 36.035,0.094 C55.626,0.094 71.507,15.935 71.507,35.476 C71.507,55.017 55.626,70.859 36.035,70.859 ZM16.839,23.320 C12.758,23.320 9.451,26.628 9.451,30.708 C9.451,34.789 12.758,38.096 16.839,38.096 C20.919,38.096 24.227,34.789 24.227,30.708 C24.227,26.628 20.919,23.320 16.839,23.320 ZM25.800,44.931 C24.182,44.931 22.870,46.242 22.870,47.861 C22.870,49.479 24.182,50.791 25.800,50.791 L46.228,50.791 C47.846,50.791 49.157,49.479 49.157,47.861 C49.157,46.242 47.846,44.931 46.228,44.931 L25.800,44.931 ZM54.458,23.320 C50.377,23.320 47.070,26.628 47.070,30.708 C47.070,34.789 50.377,38.096 54.458,38.096 C58.538,38.096 61.846,34.789 61.846,30.708 C61.846,26.628 58.538,23.320 54.458,23.320 Z"/></svg></button>
        <button class="action-btn" data-player="player1" data-action="flush"><div class="btn-text"><span>Flush</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 57 69" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M52.928,36.126 L20.579,36.126 L20.579,29.419 L52.928,29.419 C54.773,29.419 56.269,30.914 56.269,32.759 L56.269,32.785 C56.269,34.631 54.773,36.126 52.928,36.126 ZM0.514,30.760 L0.514,8.369 C0.514,3.768 4.244,0.038 8.845,0.038 L8.871,0.038 C13.472,0.038 17.202,3.768 17.202,8.369 L17.202,36.100 L5.854,36.100 C2.905,36.100 0.514,33.709 0.514,30.760 ZM54.677,43.166 C54.677,49.674 49.401,54.951 42.892,54.951 L38.798,54.951 L33.143,68.770 L9.717,68.770 L9.717,39.116 L54.677,39.116 L54.677,43.166 Z"/></svg></button>
      </div>
      <div class="action-buttons vote-row" style="justify-content: flex-end;">
        <button class="action-btn vote-btn" data-player="player1" data-action="vote"><span>Vote This</span></button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;">
      <div id="round-label" style="font-family:'Exo 2',sans-serif;font-size:13px;font-weight:900;color:#555;letter-spacing:0.1em;margin-bottom:-20px;">ROUND 1</div>
      <div id="round-counter">30</div>
      <div id="flush-toast-container"></div>
    </div>
    <div>
      <div id="player2-health" class="health-bar">
        <div class="health-bar-fill"></div>
        <div class="player-label" id="player2-label">HAMMER</div>
        <canvas id="p2-waveform" class="health-waveform"></canvas>
      </div>
      <div class="round-bar"><div class="round-bar-fill"></div></div>
      <div class="action-buttons">
        <button class="action-btn" data-player="player2" data-action="fyre"><div class="btn-text"><span>Fyre</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 57 79" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M30.725,78.321 C29.517,78.356 28.359,78.329 27.227,78.272 C32.277,76.806 36.778,69.952 34.759,61.942 C32.479,52.897 23.573,54.229 24.192,44.598 C10.646,57.102 15.247,73.728 22.182,77.696 C-2.748,72.999 -5.191,43.785 9.525,30.487 C23.529,17.833 25.196,9.315 27.138,0.076 C27.138,0.076 41.318,10.225 41.652,19.400 C41.985,28.575 32.995,33.722 37.607,38.032 C42.218,42.342 48.685,37.042 47.472,32.220 C61.107,46.792 63.504,77.371 30.725,78.321 Z"/></svg></button>
        <button class="action-btn" data-player="player2" data-action="mid"><div class="btn-text"><span>Mid</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 72 71" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M36.035,70.859 C16.445,70.859 0.563,55.017 0.563,35.476 C0.563,15.935 16.445,0.094 36.035,0.094 C55.626,0.094 71.507,15.935 71.507,35.476 C71.507,55.017 55.626,70.859 36.035,70.859 ZM16.839,23.320 C12.758,23.320 9.451,26.628 9.451,30.708 C9.451,34.789 12.758,38.096 16.839,38.096 C20.919,38.096 24.227,34.789 24.227,30.708 C24.227,26.628 20.919,23.320 16.839,23.320 ZM25.800,44.931 C24.182,44.931 22.870,46.242 22.870,47.861 C22.870,49.479 24.182,50.791 25.800,50.791 L46.228,50.791 C47.846,50.791 49.157,49.479 49.157,47.861 C49.157,46.242 47.846,44.931 46.228,44.931 L25.800,44.931 ZM54.458,23.320 C50.377,23.320 47.070,26.628 47.070,30.708 C47.070,34.789 50.377,38.096 54.458,38.096 C58.538,38.096 61.846,34.789 61.846,30.708 C61.846,26.628 58.538,23.320 54.458,23.320 Z"/></svg></button>
        <button class="action-btn" data-player="player2" data-action="flush"><div class="btn-text"><span>Flush</span><span class="btn-counter">x0</span></div><svg class="btn-icon" viewBox="0 0 57 69" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M52.928,36.126 L20.579,36.126 L20.579,29.419 L52.928,29.419 C54.773,29.419 56.269,30.914 56.269,32.759 L56.269,32.785 C56.269,34.631 54.773,36.126 52.928,36.126 ZM0.514,30.760 L0.514,8.369 C0.514,3.768 4.244,0.038 8.845,0.038 L8.871,0.038 C13.472,0.038 17.202,3.768 17.202,8.369 L17.202,36.100 L5.854,36.100 C2.905,36.100 0.514,33.709 0.514,30.760 ZM54.677,43.166 C54.677,49.674 49.401,54.951 42.892,54.951 L38.798,54.951 L33.143,68.770 L9.717,68.770 L9.717,39.116 L54.677,39.116 L54.677,43.166 Z"/></svg></button>
      </div>
      <div class="action-buttons vote-row">
        <button class="action-btn vote-btn" data-player="player2" data-action="vote"><span>Vote That</span></button>
      </div>
    </div>
  </div>

  <div id="debug-boxes" style="display:none">
    <div id="debug-p1" class="debug-panel">
      <div class="debug-panel-title">P1</div>
      <div class="debug-panel-list" id="debug-p1-list"></div>
    </div>
    <div id="debug-p2" class="debug-panel">
      <div class="debug-panel-title">P2</div>
      <div class="debug-panel-list" id="debug-p2-list"></div>
    </div>
  </div>

  <div id="p2-editor-box" style="display:none;position:fixed;top:0;right:0;width:180px;height:100%;background:rgba(0,0,0,0.6);z-index:9999;overflow-y:auto;padding:10px 0;">
    <div style="color:white;text-align:center;padding:10px;font-weight:bold;">P2 Moves</div>
    <div id="p2-editor-list"></div>
  </div>

  <script src="lib/spine-webgl.js"></script>
  <script src="js/game.js"></script>
  <script src="js/waveform.js"></script>
  <script src="js/beat2.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/audio.js"></script>
</body>
</html>
